name: App Dev Cloud Run Prep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Frontend lint, test, and web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_API_URL: "http://localhost:3000/api"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend web export
        run: npm run build:web

  backend-checks:
    name: Backend deploy readiness checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend syntax checks
        run: npm run check:ci

  ml-checks:
    name: ML service install and smoke checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/ml-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Backend/ml-service/requirements.txt

      - name: Install ML service dependencies
        run: pip install -r requirements.txt

      - name: Smoke test ML service import
        run: python -c "from app import app; print(sorted(str(rule) for rule in app.url_map.iter_rules()))"

  deploy-backend:
    name: Deploy backend to Cloud Run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_CLOUD_RUN_DEPLOY == 'true'
    needs: [frontend-checks, backend-checks, ml-checks]
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.backend-url.outputs.service_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build backend image
        run: |
          BACKEND_IMAGE_URI="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}/${{ vars.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          echo "BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build --platform linux/amd64 -t "${BACKEND_IMAGE_URI}" Backend

      - name: Build ML image
        run: |
          ML_IMAGE_URI="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}/${{ vars.ML_IMAGE_NAME }}:${{ github.sha }}"
          echo "ML_IMAGE_URI=${ML_IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build --platform linux/amd64 -t "${ML_IMAGE_URI}" Backend/ml-service

      - name: Build reverse image search image
        run: |
          REVERSE_IMAGE_SEARCH_IMAGE_URI="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}/${{ vars.REVERSE_IMAGE_SEARCH_IMAGE_NAME }}:${{ github.sha }}"
          echo "REVERSE_IMAGE_SEARCH_IMAGE_URI=${REVERSE_IMAGE_SEARCH_IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build \
            --platform linux/amd64 \
            -f Backend/ml-service/reverse_image_search/Dockerfile \
            -t "${REVERSE_IMAGE_SEARCH_IMAGE_URI}" \
            Backend/ml-service

      - name: Push backend image
        run: docker push "${BACKEND_IMAGE_URI}"

      - name: Push ML image
        run: docker push "${ML_IMAGE_URI}"

      - name: Push reverse image search image
        run: docker push "${REVERSE_IMAGE_SEARCH_IMAGE_URI}"

      - name: Render backend Cloud Run manifest
        env:
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          BASE_URL: ${{ vars.BASE_URL }}
          ANALYTICS_SERVICE_URL: ${{ vars.ANALYTICS_SERVICE_URL }}
          FAISS_BUCKET_NAME: ${{ vars.FAISS_BUCKET_NAME }}
          FAISS_OBJECT_NAME: ${{ vars.FAISS_OBJECT_NAME }}
          RAG_BUCKET_NAME: ${{ vars.RAG_BUCKET_NAME }}
          RAG_OBJECT_PREFIX: ${{ vars.RAG_OBJECT_PREFIX }}
          RUNTIME_MONGO_URI: ${{ secrets.MONGO_URI }}
          RUNTIME_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RUNTIME_OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          RUNTIME_HUGGING_FACE_TOKEN: ${{ secrets.HUGGING_FACE_TOKEN }}
        run: |
          cat <<EOF > /tmp/backend-cloudrun.yaml
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: ${{ vars.BACKEND_CLOUD_RUN_SERVICE }}
            annotations:
              run.googleapis.com/invoker-iam-disabled: 'true'
          spec:
            template:
              metadata:
                annotations:
                  run.googleapis.com/container-dependencies: '{"backend":["ml-service","reverse-image-search"]}'
              spec:
                serviceAccountName: github-actions-prod@sit-26t1-discountmate-935cb94.iam.gserviceaccount.com
                containers:
                  - name: backend
                    image: ${BACKEND_IMAGE_URI}
                    ports:
                      - name: http1
                        containerPort: 8080
                    resources:
                      limits:
                        cpu: "1"
                        memory: 1Gi
                    env:
                      - name: NODE_ENV
                        value: production
                      - name: GOOGLE_CLOUD_PROJECT
                        value: ${{ vars.GCP_PROJECT_ID }}
                      - name: ML_SERVICE_URL
                        value: http://127.0.0.1:5001
                      - name: REVERSE_IMAGE_SEARCH_SERVICE_URL
                        value: http://127.0.0.1:8001
                      - name: MONGO_URI_SECRET_NAME
                        value: mongo-uri
                      - name: JWT_SECRET_SECRET_NAME
                        value: jwt-secret
          EOF
          if [ -n "${CORS_ORIGIN}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: CORS_ORIGIN
                        value: ${CORS_ORIGIN}
          EOF
          fi
          if [ -n "${BASE_URL}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: BASE_URL
                        value: ${BASE_URL}
          EOF
          fi
          if [ -n "${ANALYTICS_SERVICE_URL}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: ANALYTICS_SERVICE_URL
                        value: ${ANALYTICS_SERVICE_URL}
          EOF
          fi
          if [ -n "${RUNTIME_MONGO_URI}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: MONGO_URI
                        value: ${RUNTIME_MONGO_URI}
          EOF
          fi
          if [ -n "${RUNTIME_JWT_SECRET}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: JWT_SECRET
                        value: ${RUNTIME_JWT_SECRET}
          EOF
          fi
          cat <<EOF >> /tmp/backend-cloudrun.yaml
                  - name: ml-service
                    image: ${ML_IMAGE_URI}
                    resources:
                      limits:
                        cpu: "2"
                        memory: 4Gi
                    env:
                      - name: ML_SERVICE_PORT
                        value: "5001"
                      - name: GOOGLE_CLOUD_PROJECT
                        value: ${{ vars.GCP_PROJECT_ID }}
                      - name: MONGO_URI_SECRET_NAME
                        value: mongo-uri
                      - name: OPEN_ROUTER_API_KEY_SECRET_NAME
                        value: open-router-api-key
                      - name: HUGGING_FACE_TOKEN_SECRET_NAME
                        value: hugging-face-token
                      - name: RAG_BUCKET_NAME
                        value: ${RAG_BUCKET_NAME}
                      - name: RAG_OBJECT_PREFIX
                        value: ${RAG_OBJECT_PREFIX}
          EOF
          if [ -n "${RUNTIME_MONGO_URI}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: MONGO_URI
                        value: ${RUNTIME_MONGO_URI}
          EOF
          fi
          if [ -n "${RUNTIME_OPEN_ROUTER_API_KEY}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: OPEN_ROUTER_API_KEY
                        value: ${RUNTIME_OPEN_ROUTER_API_KEY}
          EOF
          fi
          if [ -n "${RUNTIME_HUGGING_FACE_TOKEN}" ]; then
            cat <<EOF >> /tmp/backend-cloudrun.yaml
                      - name: HUGGING_FACE_TOKEN
                        value: ${RUNTIME_HUGGING_FACE_TOKEN}
          EOF
          fi
          cat <<EOF >> /tmp/backend-cloudrun.yaml
                    startupProbe:
                      tcpSocket:
                        port: 5001
                      failureThreshold: 150
                      periodSeconds: 2
                  - name: reverse-image-search
                    image: ${REVERSE_IMAGE_SEARCH_IMAGE_URI}
                    resources:
                      limits:
                        cpu: "2"
                        memory: 4Gi
                    env:
                      - name: GOOGLE_CLOUD_PROJECT
                        value: ${{ vars.GCP_PROJECT_ID }}
                      - name: FAISS_GCP_PROJECT
                        value: ${{ vars.GCP_PROJECT_ID }}
                      - name: FAISS_BUCKET_NAME
                        value: ${FAISS_BUCKET_NAME}
                      - name: FAISS_OBJECT_NAME
                        value: ${FAISS_OBJECT_NAME}
                    startupProbe:
                      tcpSocket:
                        port: 8001
                      failureThreshold: 150
                      periodSeconds: 2
          EOF
          echo "Rendered backend Cloud Run manifest at /tmp/backend-cloudrun.yaml"

      - name: Deploy backend service
        run: |
          gcloud run services replace /tmp/backend-cloudrun.yaml \
            --region "${{ vars.GCP_REGION }}"

      - name: Capture backend URL
        id: backend-url
        run: |
          SERVICE_URL="$(gcloud run services describe "${{ vars.BACKEND_CLOUD_RUN_SERVICE }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)')"
          echo "service_url=${SERVICE_URL}" >> "${GITHUB_OUTPUT}"

  deploy-frontend:
    name: Deploy frontend to Cloud Run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_CLOUD_RUN_DEPLOY == 'true'
    needs: [frontend-checks, backend-checks, ml-checks, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build frontend image
        env:
          FRONTEND_API_URL: ${{ vars.BACKEND_PUBLIC_API_URL != '' && vars.BACKEND_PUBLIC_API_URL || format('{0}/api', needs.deploy-backend.outputs.service_url) }}
        run: |
          FRONTEND_IMAGE_URI="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}/${{ vars.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"
          echo "FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build \
            --platform linux/amd64 \
            --build-arg EXPO_PUBLIC_API_URL="${FRONTEND_API_URL}" \
            -t "${FRONTEND_IMAGE_URI}" \
            Frontend

      - name: Push frontend image
        run: docker push "${FRONTEND_IMAGE_URI}"

      - name: Deploy frontend service
        run: |
          gcloud run deploy "${{ vars.FRONTEND_CLOUD_RUN_SERVICE }}" \
            --image "${FRONTEND_IMAGE_URI}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080
