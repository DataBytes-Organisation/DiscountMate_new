services:
  postgres:
    image: postgres:16
    container_name: silver_ref_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: discountmate
    ports:
      - "5433:5432"
    volumes:
      - silver_ref_postgres_data:/var/lib/postgresql/data

volumes:
  silver_ref_postgres_data:
